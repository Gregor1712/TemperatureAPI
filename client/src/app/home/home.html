<mat-tab-group mat-stretch-tabs="false" mat-align-tabs="center"
               (selectedTabChange)="getTemperature($event.tab.textLabel)">
  <mat-tab label="Bratislava"></mat-tab>
  <mat-tab label="Praha"></mat-tab>
</mat-tab-group>

@if (temperature) {
  <div class="temperature-result">
    <b>City:</b> <span>{{ temperature.city }}</span>
    <b>Temperature:</b> <span>{{ temperature.temperatureC }} °C</span>
    <b>Date and Time:</b> <span>{{ temperature.measuredAtUtc | date: 'dd-MM-yyyy HH:mm:ss' }}</span>
  </div>
}
