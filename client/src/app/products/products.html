<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8" #matTable>

  <ng-container matColumnDef="city">
    <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by city"> City </th>
    <td mat-cell *matCellDef="let element"> {{element.city}} </td>
  </ng-container>

  <ng-container matColumnDef="temperatureC">
    <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by temperature"> Temperature </th>
    <td mat-cell *matCellDef="let element"> {{element.temperatureC}} </td>
  </ng-container>

  <ng-container matColumnDef="measuredAtUtc">
    <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by date"> Date </th>
    <td mat-cell *matCellDef="let element"> {{element.measuredAtUtc}} </td>
  </ng-container>

  <ng-container matColumnDef="city-filter">
    <th mat-header-cell *matHeaderCellDef>
      <app-autocomplete-column
        label="City"
        [options]="cityOptions"
        (valueChanged)="onColumnFilter('city', $event)"
      />
    </th>
  </ng-container>

  <ng-container matColumnDef="temperatureC-filter">
    <th mat-header-cell *matHeaderCellDef>
      <app-autocomplete-column
        label="Temperature"
        [options]="temperatureCOptions"
        (valueChanged)="onColumnFilter('temperatureC', $event)"
      />
    </th>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-header-row *matHeaderRowDef="filterColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator
  [length]="temperatureHistory?.count ?? 0"
  [pageSize]="temperatureHistory?.pageSize ?? 10"
  [pageIndex]="(temperatureHistory?.pageIndex ?? 1) - 1"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="pageChange($event)"
  showFirstLastButtons>
</mat-paginator>
