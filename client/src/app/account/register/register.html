<div class="login-container">
  <mat-card class="login-card">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <h1 class="login-title">Register</h1>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Display name</mat-label>
        <input matInput formControlName="displayName" type="text" placeholder="Name" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email address</mat-label>
        <input matInput formControlName="email" type="email" placeholder="name@example.com" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" type="password" placeholder="Password" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Confirm password</mat-label>
        <input matInput formControlName="confirmPassword" type="password" placeholder="Password" />
      </mat-form-field>

      @if (passwordMismatch) {
        <p class="error-message">Passwords do not match</p>
      }

      <button mat-flat-button type="submit" color="primary" class="login-button">
        Register
      </button>

    </form>
  </mat-card>
</div>
